# User Service GitLab CI/CD Pipeline
stages:
  - build
  - test
  - qualite
  - package
  - deploy

variables:
  COMPOSER_CACHE_DIR: "${CI_PROJECT_DIR}/.composer-cache"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  IMAGE_NAME: "${CI_REGISTRY_IMAGE}/user-service"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"

# --- Template PHP avec toutes les extensions requises ---
.php-env:
  image: php:8.2-cli
  before_script:
    - apt-get update -qq && apt-get install -y -qq git unzip libpq-dev libzip-dev
    - docker-php-ext-install pdo pdo_pgsql sockets zip
    - pecl install pcov && docker-php-ext-enable pcov
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  cache:
    key: composer-${CI_COMMIT_REF_SLUG}
    paths:
      - .composer-cache/
      - vendor/

# Build stage - Installation des dependances
build_user_service:
  stage: build
  extends: .php-env
  script:
    - composer install --prefer-dist --no-progress --no-interaction
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour

# Test stage - Execution des tests + couverture
test_user_service:
  stage: test
  extends: .php-env
  needs:
    - job: build_user_service
      artifacts: true
  script:
    - cp .env.example .env
    - echo "RABBITMQ_ENABLED=false" >> .env
    - php artisan key:generate
    - php -d pcov.enabled=1 vendor/bin/phpunit --coverage-clover=coverage.xml --log-junit=tests-report.xml || true
  artifacts:
    when: always
    paths:
      - coverage.xml
      - tests-report.xml
    reports:
      junit: tests-report.xml
    expire_in: 1 week
  coverage: '/^\s*Lines:\s*\d+.\d+\%/'

# Qualite stage - Analyse SonarCloud
sonarcloud-check:
  stage: qualite
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  needs:
    - job: test_user_service
      artifacts: true
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: sonar-cache
    paths:
      - .sonar/cache
  script:
    - sonar-scanner -Dsonar.token=$SONAR_TOKEN -Dsonar.host.url=https://sonarcloud.io
  only:
    - main
    - develop
    - merge_requests

sast:
  stage: qualite

include:
  - template: Security/SAST.gitlab-ci.yml

# Package Docker - Build + Push vers GitLab Registry
docker_push_user_service:
  stage: package
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  needs:
    - job: test_user_service
      artifacts: false
    - job: sonarcloud-check
      artifacts: false
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$IMAGE_NAME:$IMAGE_TAG" .
    - docker push "$IMAGE_NAME:$IMAGE_TAG"
    - if [ "$CI_COMMIT_BRANCH" = "main" ]; then docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:latest" && docker push "$IMAGE_NAME:latest"; fi
  only:
    - main
    - develop
  when: manual

# Deploy - Deploiement sur Kubernetes
deploy_user_service:
  stage: deploy
  image: bitnami/kubectl:latest
  needs:
    - job: docker_push_user_service
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
  script:
    - kubectl set image deployment/user-service user-service="$IMAGE_NAME:$IMAGE_TAG" --namespace=$KUBE_NAMESPACE
    - kubectl rollout status deployment/user-service --namespace=$KUBE_NAMESPACE --timeout=120s
  environment:
    name: production
  only:
    - main
  when: manual

