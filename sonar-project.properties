# SonarCloud Configuration - User Service
sonar.projectKey=maisonepouvante_user-service
sonar.organization=maisonepouvante

# Project Information
sonar.projectName=User Service
sonar.projectVersion=1.0

# Source and Test Directories
sonar.sources=app
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# PHP specific settings
sonar.language=php
sonar.php.version=8.0

# Coverage Reports
sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=tests-report.xml

# Exclusions
sonar.exclusions=**/vendor/**,**/storage/**,**/public/**,**/bootstrap/cache/**,**/resources/views/**
sonar.test.exclusions=**/vendor/**

# Quality Gate
sonar.qualitygate.wait=false
